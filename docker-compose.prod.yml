version: "3.9"

# ── Production compose — uses pre-built images from Docker Hub ────────────────
# Run: docker compose -f docker-compose.prod.yml up -d

services:
  nginx:
    image: ${DOCKER_USERNAME}/invoicehive-nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL certificates from Certbot
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    restart: always
    networks:
      - invoicehive_net

  auth-service:
    image: ${DOCKER_USERNAME}/invoicehive-auth-service:latest
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGO_URI=mongodb://mongo-auth:27017/invoicehive_auth
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongo-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - invoicehive_net

  client-service:
    image: ${DOCKER_USERNAME}/invoicehive-client-service:latest
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3002
      - MONGO_URI=mongodb://mongo-clients:27017/invoicehive_clients
    depends_on:
      mongo-clients:
        condition: service_healthy
    restart: always
    networks:
      - invoicehive_net

  invoice-service:
    image: ${DOCKER_USERNAME}/invoicehive-invoice-service:latest
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3003
      - MONGO_URI=mongodb://mongo-invoices:27017/invoicehive_invoices
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - MINIO_ENDPOINT=minio
      - CLIENT_SERVICE_URL=http://client-service:3002
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser
    shm_size: "1gb"
    depends_on:
      mongo-invoices:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: always
    networks:
      - invoicehive_net

  payment-service:
    image: ${DOCKER_USERNAME}/invoicehive-payment-service:latest
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3004
      - MONGO_URI=mongodb://mongo-payments:27017/invoicehive_payments
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - INVOICE_SERVICE_URL=http://invoice-service:3003
    depends_on:
      mongo-payments:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: always
    networks:
      - invoicehive_net

  notification-service:
    image: ${DOCKER_USERNAME}/invoicehive-notification-service:latest
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3005
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: always
    networks:
      - invoicehive_net

  # ── Infrastructure ──────────────────────────────────────────────────────────
  mongo-auth:
    image: mongo:7
    volumes:
      - mongo_auth_data:/data/db
    restart: always
    networks:
      - invoicehive_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-clients:
    image: mongo:7
    volumes:
      - mongo_clients_data:/data/db
    restart: always
    networks:
      - invoicehive_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-invoices:
    image: mongo:7
    volumes:
      - mongo_invoices_data:/data/db
    restart: always
    networks:
      - invoicehive_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-payments:
    image: mongo:7
    volumes:
      - mongo_payments_data:/data/db
    restart: always
    networks:
      - invoicehive_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - invoicehive_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    # NOT exposing port 15672 in production — management UI should be private
    restart: always
    networks:
      - invoicehive_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    # NOT exposing ports in production — access via internal network only
    restart: always
    networks:
      - invoicehive_net

volumes:
  mongo_auth_data:
  mongo_clients_data:
  mongo_invoices_data:
  mongo_payments_data:
  redis_data:
  rabbitmq_data:
  minio_data:

networks:
  invoicehive_net:
    driver: bridge
