version: "3.9"

services:
  client-service:
    build: .
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - MONGO_URI=${MONGO_URI}
      - JWT_ACCESS_SECRET=dev_access_secret_change_in_prod
      - INTERNAL_SECRET=dev_internal_secret_change_in_prod
      - CLIENT_URL=http://localhost:3000
    volumes:
      - .:/app
      - /app/node_modules
    command: node --watch src/index.js
    restart: unless-stopped
